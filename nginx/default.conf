server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # 인덱스 파일 경로 설정 (도커 컨테이너 기준)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 에러 페이지 처리
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # 필요한 경우 프록시 설정 등을 여기에 추가할 수 있습니다.
}